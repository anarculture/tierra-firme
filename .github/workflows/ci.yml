name: CI
on: [push, pull_request]

# Sin deps npm (vanilla + stdlib) → sin npm install. Corre los tests de Node y el
# selftest del webhook (cubre el path de firma HMAC) en cada push/PR.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node --test
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: webhook selftest (firma HMAC)
        run: python3 whatsapp_buzon.py --selftest
        working-directory: ingest
