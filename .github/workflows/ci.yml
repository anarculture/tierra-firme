name: CI
on: [push, pull_request]

# Sin deps npm (vanilla + stdlib) → sin npm install. Corre los tests de Node y los
# selftests del webhook Zavu (firma HMAC) + ruteo saliente en cada push/PR.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node --test
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: zavu webhook selftest (firma HMAC)
        run: python3 zavu_buzon.py --selftest
        working-directory: ingest
      - name: reply selftest (ruteo saliente)
        run: python3 reply.py --selftest
        working-directory: ingest
